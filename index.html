	<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.js" integrity="sha512-ozq8xQKq6urvuU6jNgkfqAmT7jKN2XumbrX1JiB3TnF7tI48DPI4Gy1GXKD/V3EExgAs1V+pRO7vwtS1LHg0Gw==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>

	<script src=
		"https://cdn.jsdelivr.net/npm/leaflet.awesome-markers@2.0.5/dist/leaflet.awesome-markers.min.js">
	</script>
	<link href=
		"https://cdn.jsdelivr.net/npm/leaflet.awesome-markers@2.0.5/dist/leaflet.awesome-markers.min.css" 
	rel="stylesheet">
	<!-- <link rel="stylesheet" href="http://code.ionicframework.com/ionicons/1.5.2/css/ionicons.min.css"> -->
	<script src="https://cdnjs.cloudflare.com/ajax/libs/Leaflet.awesome-markers/2.0.5/leaflet.awesome-markers.js"></script>
	<link href="https://cdnjs.cloudflare.com/ajax/libs/Leaflet.awesome-markers/2.0.5/leaflet.awesome-markers.css" rel="stylesheet">
	<!-- 2.05 -->

	<script src="https://cdnjs.cloudflare.com/ajax/libs/alasql/4.6.6/alasql.min.js"></script> 
	<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.core.min.js"></script>

	<link href="https://unpkg.com/tabulator-tables@6.3.1/dist/css/tabulator.min.css" rel="stylesheet">
 	<script type="text/javascript" src="https://unpkg.com/tabulator-tables@6.3.1/dist/js/tabulator.min.js"></script>

	<script src="https://cdn.jsdelivr.net/npm/@turf/turf@7/turf.min.js"></script>

	<script src="https://cdn.jsdelivr.net/npm/danfojs@1.2.0/lib/bundle.min.js"></script>

	<script type="text/javascript" src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.4.0/jspdf.umd.min.js"></script>

<body style = "overflow-y: scroll" >

	<div id="tabellaGIS" class="grid">

		<div id = "blocco01GIS" class = "span4 roundBorder" >

			<div id="contMap01" style="width: 100%;"> <!-- overflow: hidden; height: 60vh -->
				<div id="leafletMap01" style="height: 70vh; border: 0px solid " ></div> <!-- height: 55vh -->
				<div style="width: 100%; display: flex; " > <!-- Disposizione ORRIZONALE: flex -->
					<div id="latLngZoom" style="width: 5%; max-width: 5%; height: 25vh; max-height: 25vh; float: left; margin: 0; padding: 0; " ></div> <!-- 1.75vh style='float: left; ' width: 100%; -->
					<div id="consoleApp" style="width: 17%; max-width: 17%; height: 25vh; max-height: 25vh; float: left; margin: 0; padding: 0; " ></div> <!-- height: 20vh -->
					<div id="ufoDataset" style="width: 77.5%; max-width: 77.5%; height: 25vh; max-height: 25vh; float: left; margin: 0; padding: 0; " ></div>
				</div>
			</div>

		</div>

	</div>

	<script>

		//*** MAP01 ***//

		map01 = L.map('leafletMap01' , { 

			zoomControl: false , // Lo disabilitiamo per controllare l'ordine di inserimento

			zoomSnap: 1 , //1
			zoomDelta : 1, 
			wheelPxPerZoomLevel: 70, //60 

		} ).setView([ 46.035235, 10.980633], 3.0 );

		baseOSM = L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
			maxZoom: 19,
		}).addTo(map01);

		/*
		baseCartoDarkMap = L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
			maxZoom: 19,
		}).addTo(map01);
		*/

		baseCyclOsmMap = L.tileLayer('https://{s}.tile-cyclosm.openstreetmap.fr/cyclosm/{z}/{x}/{y}.png', {
			maxZoom: 19,
		})//.addTo(map01);

		baseOpenTopoMap = L.tileLayer('https://tile.opentopomap.org/{z}/{x}/{y}.png', {
			maxZoom: 19,
		})//.addTo(map01);

		baseGoogleHybrid = L.tileLayer('https://mt1.google.com/vt/lyrs=y&x={x}&y={y}&z={z}', {
			maxZoom: 19,
		})//.addTo(map01);

		baseGoogleSatellite = L.tileLayer('https://mt1.google.com/vt/lyrs=s&x={x}&y={y}&z={z}', {
			maxZoom: 19,
		})//.addTo(map01);

		baseGoogleRoad = L.tileLayer('https://mt1.google.com/vt/lyrs=m&x={x}&y={y}&z={z}', {
			maxZoom: 19,
		})//.addTo(map01);

		baseMaps = {  
			"<span style='font-family: Trebuchet MS; font-size: 1.75vh;'>OpenStreetMap</span>": baseOSM,
			//"CartoDarkMap": baseCartoDarkMap, 
			"<span style='font-family: Trebuchet MS; font-size: 1.75vh;'>CyclOsmMap</span>": baseCyclOsmMap,
			"<span style='font-family: Trebuchet MS; font-size: 1.75vh;'>OpenTopoMap</span>": baseOpenTopoMap,
			"<span style='font-family: Trebuchet MS; font-size: 1.75vh;'>Google Hybrid</span>": baseGoogleHybrid,
			"<span style='font-family: Trebuchet MS; font-size: 1.75vh;'>Google Satellite</span>": baseGoogleSatellite,
			"<span style='font-family: Trebuchet MS; font-size: 1.75vh;'>Google Road</span>": baseGoogleRoad,
		}

		layerDrawItems = new L.FeatureGroup();
		layerMarkers = new L.FeatureGroup();

		overlayMaps = {
			//GeoJSON data initialization 
			"<span style='font-family: Trebuchet MS; font-size: 1.75vh;'><u>Draw Items</u></span>" : layerDrawItems, 
			"<span style='font-family: Trebuchet MS; font-size: 1.75vh;'><u>Markers</u></span>" : layerMarkers,
		};

		layerControl = L.control.layers(baseMaps, overlayMaps).addTo( map01 );

		//Aggiunta Titolo BASE MAP DOPO inserimento Controllo sulla Mappa

		baseLayersContainer = document.querySelector('.leaflet-control-layers-base');

		titleElement01 = document.createElement('div');
		titleElement01.innerHTML = "<span style='font-family: Trebuchet MS; font-size: 1.75vh;'><b>Base Map: </b></span>";

		baseLayersContainer.insertBefore(titleElement01, baseLayersContainer.firstChild);

		//

		//Aggiunta Titolo OVERLAY MAP DOPO inserimento Controllo sulla Mappa 

		var overlayContainer = document.querySelector('.leaflet-control-layers-overlays');

		titleElement02 = document.createElement('div');
		titleElement02.innerHTML = "<span style='font-family: Trebuchet MS; font-size: 1.75vh;'><b>Overlay Map: </b></span>";

		overlayContainer.insertBefore(titleElement02, overlayContainer.firstChild);

		//Link Button for SITE

		var divLink = L.control({ position: 'topleft' });

		divLink.onAdd = function (map01) {
			var div = L.DomUtil.create('div' ); //, CSS Style ...

			var btnStyle = "background-color: lightgray ; color: green; padding: 0vh 0vh; font-size: 1.5vh; font-weight: bold; font-style: italic; border-radius: 1vh; min-width: 14vh; height: 3.0vh; border-color: green; cursor: pointer; ";
			/*var btnStyle = "background-color: white ; color: green; padding: 0vh 0vh; font-size: 1.8vh; font-weight: bold; border-radius: 1vh; min-width: 15vh; height: 3.5vh; border-color: green;";*/
			/* border: 2px solid yellow; */
			/*lightseagreen*/
			/* 16px */
			/*height: auto; */
			/*color: white;*/

			div.innerHTML = `
				<div style="display: flex; background: #ffffff; border: 0px solid #000000; border-radius: 5px; margin: 0px; padding: 2px;" >
					<div id="rif_LINK_Contenuto" >
						<!-- <button id="tab_schedaUFOUAP" onclick="window.open('...URL...', '_blank')" >- UFO/UAP -</button> -->
						<button id="tab_schedaGIS" onclick="window.open('./schedaGIS.html', '_blank')" style="${btnStyle}" >- GIS -</button>
						<button id="tab_schedaBlazor" onclick="window.open('https://geoinf25.github.io/repoBlazor/', '_blank')" style="${btnStyle}" >- BLAZOR -</button>
						<button id="tab_schedaReact" onclick="window.open('https://geoinf25.github.io/my-project/', '_blank')" style="${btnStyle}" >- REACT -</button>
						<button id="tab_schedaRShiny" onclick="window.open('https://geoinf25.github.io/site/Shiny/docs/index.html', '_blank')" style="${btnStyle}" >- R / SHINY -</button>
						<button id="tab_schedaJupyter" onclick="window.open('./schedaJupyter.html', '_blank')" style="${btnStyle}" >- JUPYTER / PY -</button>
						<button id="tab_schedaCSharp" onclick="window.open('./schedaCSharp.html', '_blank')" style="${btnStyle}" >- C# -</button>
						<br>
						<button id="tab_schedaJavascript" onclick="window.open('./schedaJavascript.html', '_blank')" style="${btnStyle}" >- JAVASCRIPT -</button>
						<button id="tab_schedaJava" onclick="window.open('./schedaJava.html', '_blank')" style="${btnStyle}" >- JAVA -</button>
						<button id="tab_schedaDatabase" onclick="window.open('./schedaDatabase.html', '_blank')" style="${btnStyle}" >- DATABASE -</button>
						<!-- Tab GIS -->
						<button id="tab_schedaDisegni3D" onclick="window.open('./schedaDisegni3D.html', '_blank')" style="${btnStyle}" >- 3D DRAWINGS -</button>
						<button id="tab_schedaDartFlutter" onclick="window.open('https://geoinf25.github.io/site/Flutter/flutter_app01/build/web/index.html', '_blank')" style="${btnStyle}" >- FLUTTER -</button>
						<button id="tab_schedaAbout" onclick="window.open('./schedaAbout.html', '_blank')" style="${btnStyle}" >- ABOUT -</button>

						<!-- '_blank': Questo secondo parametro indica al browser di aprire l'URL in una nuova scheda o finestra. -->
						<!-- Esempio URL completo: https://geoinf25.github.io/site/schedaJavascript.html -->
					</div>

					<button id="rif_LINK_Button" type="button" style="font-family: 'Trebuchet MS'; font-size: 1.5vh; font-style: italic; " >
						🔄 Show / Hide<br>BUTTONS
					</button>
				</div>				
			`;

			const btn_LINK = div.querySelector('#rif_LINK_Button');
    		const contenuto_LINK = div.querySelector('#rif_LINK_Contenuto');
			
			btn_LINK.addEventListener('click', function() {
        		if (contenuto_LINK.style.display === 'none') {
            		contenuto_LINK.style.display = 'block';
            		btn_LINK.textContent = '❌ Hide BUTTONS';
        		} else {
            		contenuto_LINK.style.display = 'none';
            		btn_LINK.textContent = '🔄 Show / Hide BUTTONS';
        		}
    		});

			L.DomEvent.disableClickPropagation(div);

			return div;

		};

		divLink.addTo(map01);

		//ZOOM Control 

		L.control.zoom({ position: 'topleft' }).addTo(map01);

		//DRAW Control

		var drawControl = new L.Control.Draw({
			edit: {
				featureGroup: layerDrawItems,
			},
			draw: {
				polyline: {	metric: 'metric' },
				polygon : { metric: 'metric' },
				rectangle: { metric: 'metric' },  
				circle: { metric: 'metric' },
				marker: { metric: 'metric' }, 
				circlemarker: { metric: 'metric' }, 
			},
		});
				
		map01.addControl(drawControl);

		map01.on( "draw:created" , function( e ) {
				type = e.layerType; 
				layer = e.layer;
				
				jsonFeature = "" + JSON.stringify( layer.toGeoJSON() )

				popup = L.popup().setContent( jsonFeature );

				layer.bindPopup( popup ); 
				console.log( layer.toGeoJSON() );

				tempObj = {
					DateTime : getDateTime() , 
					Event : "Plot Feature on Map",
					Message_ConsoleApp : "- Type of Feature: " + type + "\n" + 
						jsonFeature
				};

				dataConsoleApp.unshift( tempObj );

				consoleApp.setData( dataConsoleApp );
				
				layerDrawItems.addLayer( layer ); 
		}); 

		//Mappe, Layer visibili
		var click_elements = document.getElementsByClassName("leaflet-control-layers-selector");

		click_elements[ 0 ].click(); //baseMaps

		click_elements[ click_elements.length - 2 ].click(); //layerDrawItems
		click_elements[ click_elements.length - 1 ].click(); //layerMarkers //Vedi funzione seguente

		//markerClusterGroup
		var cluMarkers = L.markerClusterGroup();

		//minimap 
		
		layerMiniMap = L.tileLayer( 'https://mt1.google.com/vt/lyrs=m&x={x}&y={y}&z={z}' ); 
		miniMap = new L.Control.MiniMap( layerMiniMap , { 
				toggleDisplay : true , 
				zoomLevelOffset: -16, 
				width: Math.round( window.screen.width /10.0 ), 
				height: Math.round( window.screen.height /10.0 ) , 
		} ).addTo(map01);

		miniMap.setPosition('topright'); 

		var measureControl = new L.Control.Measure( { primaryLengthUnit: "kilometers" , primaryAreaUnit: "sqmeters" } );

		// Disable auto-pan by overriding the plugin’s internal method(s):
		L.Control.Measure.include({
			// Prevent auto-panning when the capture marker is placed
			_setCaptureMarkerIcon: function () {
				// Turn off autoPan
				this._captureMarker.options.autoPanOnFocus = false;
				// Call the original icon setup
				this._captureMarker.setIcon(
				L.divIcon({
					iconSize: this._map.getSize().multiplyBy(2),
				})
				);
			},

			// Optionally, override _startMeasure or other private methods if needed
			// _startMeasure: function () {
				//   // Your custom override
			// },
			});

		measureControl.addTo( map01 );

		//*** TABULATOR JS ***// 

		getDateTime = () => {
			tempDateTime = new Date(); 
			dd = ( "" + tempDateTime.getDate() ).padStart(2, '0');
			mm = ("" + (tempDateTime.getMonth() + 1) ).padStart(2, '0'); // Nota: i mesi in JS partono da 0 (0 = Gennaio)
			yyyy = "" + tempDateTime.getFullYear();
			h = ( "" + tempDateTime.getHours()).padStart(2, '0');
			m = ( "" + tempDateTime.getMinutes()).padStart(2, '0');
			s = ( "" + tempDateTime.getSeconds()).padStart(2, '0');
			return "" + dd + "/" + mm + "/" + yyyy + " " + h + ":" + m + ":" + s; 
		};

		var menuDellaCella = [
			{
				label: "<span style='font-size: 1.3vh; font-weight: bold; color: #28a745;'>📋 Copia Cella</span>",
				action: function(e, cell) {
					// Il parametro 'cell' è il componente cella di Tabulator
					const valore = cell.getValue();
					
					navigator.clipboard.writeText(valore)
						.then(() => console.log("Copiato: " + valore))
				}
			}
		];

		dataLatLngZoom = [
			{
				Coordinates: "Latitude: --" 
			},
			{
				Coordinates: "Longitude: --" 
			},
			{
				Coordinates: "Zoom: 3.00" 
			},
		];

		dataConsoleApp = [
			/*{
				DateTime: "", 
				Event: "",
				Message_ConsoleApp: "",
				 
			},*/
		];

		dataUfoDataset = [
			/*{
				... Tabella VUOTA iniziale
				 
			},*/
		];

		latLngZoom = new Tabulator( "#latLngZoom", {
			data: dataLatLngZoom, // Carica i dati 
			layout: "fitColumns", 
			//height: "100%", //Evitare per MANCANZA di SCROLLBAR verticale
			
			//autoColumns: true, // Crea automaticamente le colonne in base alle chiavi 
			columns: [
				{title: "Coordinates", headerTooltip: true , field: "Coordinates", widthGrow: 1, formatter: "textarea", resizable: false},
			],


			footerElement: 
        		"<div style='height: 2vh'>" +
					"<br>" + 
				"</div>"
		});

		//latLngZoom.element.style.fontFamily = "'Courier New', monospace";
		latLngZoom.element.style.fontSize = "1.3vh";

		consoleApp = new Tabulator( "#consoleApp", {
			data: dataConsoleApp, // Carica i dati 
			//autoColumns: true, // Crea automaticamente le colonne in base alle chiavi 

			layout: "fitColumns", 
			//height: "100%", //Evitare per MANCANZA di SCROLLBAR verticale

			columns: [
				{title: "DateTime", headerTooltip: true , field: "DateTime", widthGrow: 3, formatter: "textarea", resizable: false},
    			{title: "Event", headerTooltip: true , field: "Event", widthGrow: 3, formatter: "textarea", resizable: false},
    			{title: "Message_Console", headerTooltip: true , field: "Message_ConsoleApp", widthGrow: 6, formatter: "textarea", resizable: false},

				
			],

			footerElement: 
        		"<div style='height: 2vh'> " +
					"<button style='font-family: Trebuchet MS; font-size: 1.3vh; font-style: italic; cursor: pointer; margin-right: 5px; '" +
					"onclick='consoleApp.download(\"xlsx\", \"Message_Console.xlsx\", {sheetName: \"Sheet01\"});'>" +
						"Export XLSX" + 
					"</button>" + 
					"<button style='font-family: Trebuchet MS; font-size: 1.3vh; font-style: italic; cursor: pointer; margin-right: 5px; '" +
					"onclick='consoleApp.download(\"csv\", \"Message_Console.csv\");'>" +
						"Export CSV" + 
					"</button>" + 
					"<button style='font-family: Trebuchet MS; font-size: 1.3vh; font-style: italic; cursor: pointer; margin-right: 5px; '" +
					"onclick='consoleApp.download(\"pdf\", \"Message_Console.pdf\");'>" +
						"Export PDF" + 
					"</button>" + 
        		"</div>" 

		});

		//consoleApp.element.style.fontFamily = "'Courier New', monospace";
		consoleApp.element.style.fontSize = "1.3vh";

		ufoDataset = new Tabulator( "#ufoDataset", {
			data: dataUfoDataset, // Carica i dati 

			//height: "500px" ,   
			//progressiveRender: "load", // Renderizza i dati a blocchi in background [3, 4]
			renderVertical: "virtual", // Forza il Virtual DOM verticale [2, 5]
			virtualDom: true,
			//layout: "fitData", // Evita continui ricalcoli delle colonne [6] 
			//virtualDomBuffer: 300,
			
			//autoColumns: true, // Crea automaticamente le colonne in base alle chiavi 
			layout: "fitColumns",
			columns: [ 
				{title: "ID", 
					headerFilter: "input", headerFilterParams: { elementAttributes: { style: "font-size: 1.3vh; width: 100%; box-sizing: border-box;" } }, 
					headerTooltip: true, field: "ID", widthGrow: 0.7, formatter: "textarea", resizable: false , 
					contextMenu: menuDellaCella  
				} ,
				{title: "Date-time", 
					headerFilter: "input", headerFilterParams: { elementAttributes: { style: "font-size: 1.3vh; width: 100%; box-sizing: border-box;" } }, 
					headerTooltip: true, field: "datetime", widthGrow: 1, formatter: "textarea", resizable: false , 
					contextMenu: menuDellaCella  
				} ,
				{title: "City", 
					headerFilter: "input", headerFilterParams: { elementAttributes: { style: "font-size: 1.3vh; width: 100%; box-sizing: border-box;" } },
					headerTooltip: true, field: "city", widthGrow: 1, formatter: "textarea", resizable: false , 
					contextMenu: menuDellaCella 
				
				} , 
				{
					title: "Shape",
					headerTooltip: true,  
					field: "shape" , 
					headerFilter: "list",  
					//Questa configurazione permette di intercettare l'elemento HTML prima che venga mostrato
            		headerFilterParams: {
						valuesLookup: true , // <--- Prende i valori presenti nella tabella
						// Applica lo stile al campo di input visibile nell'header
                		elementAttributes: {
                    		style: "font-size: 1.3vh; width: 100%; box-sizing: border-box;" // Inietta lo stile inline direttamente sull'input JS, attenzione alle dimensioni
                		} , 
						// Applica lo stile ai singoli elementi della lista a discesa
        				itemFormatter: function(value, label, item, element) {
            				element.style.fontSize = "12px";
            				element.style.fontFamily = "'YourCustomFont', sans-serif";
							return label; 
        				}
            		} ,
					widthGrow: 1, formatter: "textarea", resizable: false , 
					contextMenu: menuDellaCella 
				} , 
				{title: "Duration_Text", 
					headerFilter: "input", headerFilterParams: { elementAttributes: { style: "font-size: 1.3vh; width: 100%; box-sizing: border-box;" } },

		// Bind the rowClick event
		ufoDataset.on("rowClick", function(e, row){

			const ID = row.getData()["ID"];
			const lat = row.getData()["latitude"];
			const lng = row.getData()["longitude"]; 

			if( !isNaN(lat) && !isNaN(lng) ) {
				
				var tempIcon = L.AwesomeMarkers.icon({ //red, blue, green, purple, orange, yellow, black, grey
					icon: 'coffee',
    				markerColor: 'red' , 
    				className: 'awesome-marker awesome-marker-square'
					/*
					icon: 'star',          // Nome dell'icona (es. senza il prefisso 'fa-')
					markerColor: 'orange',   // Colore del marker di sfondo
					prefix: 'fa',            // Libreria di origine ('fa' per Font Awesome)
					iconColor: 'white'       // Colore del simbolo interno
					*/
				});
				
				/*
				const tempIcon = L.divIcon({
    				html: '<span style="font-size: 40px;">🛸</span>',
					className: '', // Rimuove lo sfondo bianco di default
    				//iconSize:,
					iconAnchor: [40, 40]  
				});
				*/

				//L.markerClusterGroup()
				var tempArr = cluMarkers.getLayers(); //markerClusterGroup -> array JS
				//L'oridnamento NON e' quello di INSERIMENTO dei Markers

				var markerSpecifico = tempArr.find(function(marker) {
    				return marker.options.id === ID; 
				});

				//Cambia l'icona al marker
				markerSpecifico.setIcon( tempIcon ); 
				//Forza l'aggiornamento visivo del cluster
				cluMarkers.refreshClusters( markerSpecifico );

				/* 
				tempArr.find(function(m) { //m -> marker
        			return m.options.id === idCercato;
    			});
				*/

				map01.setView( [ lat, lng ], 19);

			} else {
				tempObj = {
					DateTime : getDateTime() , 
					Event : "Unable to locate Marker ... ",
					Message_ConsoleApp : ( "Wrong Coordinates: " + lat + ", " + lng ),
				}; 
			
				dataConsoleApp.unshift( tempObj ); //Inizio Array 

				consoleApp.setData( dataConsoleApp );

			}

		}); 

		//Aggancia l'evento SUBITO DOPO l'inizializzazione
		ufoDataset.on("rowMouseEnter", function(e, row){
			// 'e' è l'oggetto evento del mouse
			// 'row' è il componente riga di Tabulator
			//console.log("Il mouse è entrato sulla riga:", row.getData());
			
			// Esempio: cambia lo sfondo delle celle di questa riga
			row.getCells().forEach(cell => {
				cell.getElement().style.backgroundColor = "#ffeb3b"; 
			});

			//TOOLTIP ROW
			var rowElement = row.getElement(); // Prendi l'elemento HTML della riga
        	// Imposta il messaggio del tooltip usando l'attributo 'title' standard del browser
        	rowElement.title = "Click to display UFO / UAP SIGHTING on Map ...";

		});

		// Ricordati di ripristinare il colore quando il mouse esce!
		ufoDataset.on("rowMouseLeave", function(e, row){
			row.getCells().forEach(cell => {
				cell.getElement().style.backgroundColor = ""; 
			});
		});
		/*

			//Ottieni l'elemento che contiene lo scroll (il viewport della tabella)
			var container = ufoDataset.element.querySelector(".tabulator-tableholder");

    		// Esempio: esegui un'azione sicura qui, come impostare un ordinamento iniziale
			//ufoDataset.setData( dataUfoDataset )
    		//ufoDataset.redraw(true);

		});
		
		var divNote = L.control({ position: 'bottomright' });

		divNote.onAdd = function (map01) {

			var div = L.DomUtil.create('div' ); //, CSS Style ...

			div.innerHTML = `
				<div style="background: #ffffff; border: 2px solid #000000; border-radius: 5px; margin: 0px; padding: 5px;" >
					<div id="rifDivContenuto" style=" font-family: 'Trebuchet MS'; width: 45vh; " >
						<b>UFO / UAP SIGHTING REFERENCES</b>:
						<br>
						- Reference GitHub link: <a href="https://github.com/planetsig/ufo-reports">Ufo Reports Dataset</a>; 
						<br>
						- Link to the CSV file: <a href="https://raw.githubusercontent.com/planetsig/ufo-reports/master/csv-data/ufo-scrubbed-geocoded-time-standardized.csv">File CSV</a>; 
						<br>
						- Reference Article: <a href="https://drlee.io/exploring-ufo-sightings-with-python-pandas-and-google-colab-3cf24d1843d3">Exploring UFO Sightings with Python, Pandas, and Google Colab</a>; 
						<br> 
						<!-- - Impiego della Libreria Python <a href="https://python-visualization.github.io/folium/latest/">Folium</a>;
						<br> -->
						- Using the Library <a href="https://leafletjs.com/">Leaflet</a>, <a href="https://www.tabulator.info/">Tabulator JS</a>; <!--, <a href="https://turfjs.org/">Turf</a>; -->
						<br>
						- JavaScript SQL Database, for traditional relational tables and nested JSON data (NoSQL): <a href="https://alasql.org/">AlaSQL</a>, <a href="https://github.com/alasql/alasql/wiki/XLSX">XLSX</a>;
						<br>
						- Reference Legend: <a href="https://www.cyclosm.org/legend.html">CyclOsmMap Legend</a>.
					</div>

					<button id="rifDivButton" type="button" style="font-family: 'Trebuchet MS'; font-size: 1.5vh; font-style: italic; " >
						🗺️ Show / Hide REFERENCES
					</button>

				</div>				
			`;

			const bottone = div.querySelector('#rifDivButton');
    		const contenuto = div.querySelector('#rifDivContenuto');
			
			bottone.addEventListener('click', function() {
        		if (contenuto.style.display === 'none') {
            		contenuto.style.display = 'block';
            		bottone.textContent = '❌ Hide REFERENCES';
        		} else {
            		contenuto.style.display = 'none';
            		bottone.textContent = '🗺️ Show / Hide REFERENCES';
        		}
    		});
			
			L.DomEvent.disableClickPropagation(div);

			return div;

		};

		divNote.addTo(map01);

		//*** EVENTS ***//

		map01.addEventListener('mousemove', function( e ) {
			dataLatLngZoom[0].Coordinates = "Latitude: " + ( e.latlng.lat ).toFixed( 6 ); 
			dataLatLngZoom[1].Coordinates = "Longitude: " + ( e.latlng.lng ).toFixed( 6 );

			latLngZoom.setData( dataLatLngZoom )

		});

		map01.addEventListener('zoomend', function( e ) {
			dataLatLngZoom[2].Coordinates  = "Zoom: " + ( map01.getZoom() ).toFixed( 2 );

			latLngZoom.setData( dataLatLngZoom )
		});

		map01.on('click', function(e) {
			
			tempObj = {
				DateTime : getDateTime() , 
				Event : "Click on Map",
    			Message_ConsoleApp : ( "Map clicked at: " + e.latlng.lat.toFixed( 6 ) + ", " + e.latlng.lng.toFixed( 6 ) ),
			}; 
			
			dataConsoleApp.unshift( tempObj ); //Inizio Array 

			consoleApp.setData( dataConsoleApp );

		});

		//*** DANFO JS ***//

		const url = "https://geoinf25.github.io/site/GIS/UfoDataset.csv";

		dfd.readCSV( url , { header: false } )
			.then(df => {
				//Header 0,1,2 ... NON rimovibile

				const righe = Array.from({ length: df.shape[0] }, (_, i) => i ); //Parto da 0 ... 
				df.addColumn("ID", righe, { inplace: true });
				df = df.loc({ columns: ["ID", ...df.columns.filter(c => c !== "ID")] }); //ID = Numero Riga (Prima posizione)

				const tempArr = df.values;

				let ndf = new dfd.DataFrame( tempArr , {
					columns: ["ID" , "datetime", "city", "state", "country", "shape", "duration_seconds", "duration_text", "description", "report_date", "latitude", "longitude"]
				});
				//console.log( ndf )

				//VEDI N (enne) DF ovvero ndf 

				const info = ndf.loc({ //df ridotto
					columns: [ "ID" , "latitude", "longitude" , "datetime", "city" , "shape" , "duration_text" , "description" ] 
				})

				if( layerMarkers.hasLayer( cluMarkers ) ) {
					layerMarkers.removeLayer( cluMarkers ); 
				}
				cluMarkers.clearLayers();

				//console.log( "isNaN: " + isNaN( '33q.200088' ) ); 

				const arrInfo = info.values; 
				const numbRowsArrInfo = arrInfo.length; 
				//Metodo "shape" NON permesso in quanto esiste gia' un nome di Colonna 'SHAPE' (!)

				arrInfo.map((ele, i) => { //df -> array
					const ID = ele[0]; 
					const lat = ele[1];
					const lon = ele[2];
					/*
					if( i == 0 ) {
						console.log( "ID: " + ID + ", lat: " + lat + ", lon: " + lon);
					}  
					*/
					var tempMarker = null; 
					if( !isNaN(lat) && !isNaN(lon) ) {
						//console.log( lat, lon , i )
						tempMarker = L.marker([lat, lon] , { id: ID } ).bindPopup(`
							<b>🛸UFO / UAP SIGHTING:</b><br>
							<b>* ID:</b> ${ID} di ${numbRowsArrInfo};<br> 
							<b>* Latitude, Longitude:</b> ${lat}, ${lon};<br> 
							<b>* Date-time:</b> ${ele[3]};<br>
							<b>* City:</b> ${ele[4]};<br>
							<b>* Shape:</b> ${ele[5]};<br>
							<b>* Duration:</b> ${ele[6]};<br>
							<b>* Description:</b> <i>${ele[7]}</i>.
							`
						);
					}
					if( tempMarker != null ) {
						cluMarkers.addLayer( tempMarker );
					}
				});


				layerMarkers.addLayer( cluMarkers ); 
				//map01.addLayer(cluMarkers);

				//Estrazione Marker da MarkerCluster: 
				/*
				In Leaflet.markercluster, il metodo nativo getLayers() non garantisce la restituzione dei marker secondo l'ordine cronologico 
				di inserimento precedente. Questo accade perche' la libreria indicizza e riorganizza internamente gli elementi in una struttura 
				ad albero (basata su griglie e coordinate) per ottimizzare le prestazioni di clustering.
				*/

				dataUfoDataset = dfd.toJSON( ndf )

				//ufoDataset.on("tableBuilt", function(){
					//ufoDataset.setData( dataUfoDataset )
				//});

				// Se carichi i dati dopo l'inizializzazione
				ufoDataset.setData(dataUfoDataset).then(function(){
    				// Forza Tabulator a ricalcolare le posizioni del Virtual DOM

					ufoDataset.setSort("ID", "asc"); //INDISPENSABILE PER VIRTUAL DOM (!!!) //Altri campi: datetime, ... 
    				//ufoDataset.redraw(true); 
				});


			})
			.catch(err => {
				console.log(err);
			});
		

	</script>
